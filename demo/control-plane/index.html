function channelBadge(c){

function kpi(o){
  return '<div class="panel kpi"><div style="display:flex;justify-content:space-between;align-items:flex-start">'+
    '<div class="l">'+o.label+'</div><div class="ic" style="color:'+o.color+'">'+o.icon+'</div></div>'+

}
function donut(segments, size, label){
  size = size||140;
  var total = segments.reduce(function(a,s){return a+s.n;},0);
  var r = size/2-14, cx=size/2, cy=size/2, C=2*Math.PI*r, off=0, parts="";
  segments.forEach(function(s){
    var len=(s.n/total)*C;
    parts += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+s.c+'" stroke-width="16" stroke-dasharray="'+len+' '+(C-len)+'" stroke-dashoffset="'+(-off)+'" transform="rotate(-90 '+cx+' '+cy+')"></circle>';
    off += len;
  });
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#e6eef8" stroke-width="16"></circle>'+parts+
    '<text x="'+cx+'" y="'+(cy-2)+'" text-anchor="middle" fill="#14233b" font-size="22" font-weight="700">'+total+'</text>'+
    '<text x="'+cx+'" y="'+(cy+16)+'" text-anchor="middle" fill="#5d6f8c" font-size="10">'+label+'</text></svg>';
}
function bars(data, height){
  height = height||130;
  var max = Math.max.apply(null, data.map(function(d){return d.n;}));
  var inner = data.map(function(d){
    return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px">'+
      '<div style="font-size:11px;color:var(--muted)">'+d.n+'</div>'+
      '<div style="width:100%;max-width:46px;height:'+((d.n/max)*100)+'%;min-height:4px;background:linear-gradient(180deg,'+d.c+','+d.c+'55);border-radius:6px 6px 0 0"></div>'+
      '<div style="font-size:10.5px;color:var(--faint);text-align:center">'+d.label+'</div></div>';
  }).join("");

function vLicenses(){
  var grace = LEASES.filter(function(l){return l.state==="Льготный";});
  var valid = LEASES.filter(function(l){return l.state==="Действует";}).length;
  var hard  = LEASES.filter(function(l){return l.state==="Остановлен";}).length;

  var graceRows = LEASES.map(function(l){
    var pct = l.left===null ? 100 : Math.round((l.left/7)*100);
    var leftHtml = l.state==="Льготный"
      ? '<div style="min-width:120px"><div style="display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin-bottom:4px"><span>осталось '+l.left+' дн.</span><span>из 7</span></div>'+
        '<div style="height:6px;background:var(--panel2);border-radius:99px;overflow:hidden"><span style="display:block;height:100%;width:'+pct+'%;background:linear-gradient(90deg,#f59e0b,#f97316)"></span></div></div>'
      : (l.state==="Остановлен" ? '<span class="badge b-bad">грейс исчерпан</span>' : '<span class="chip">—</span>');
    var act = (l.state==="Льготный")
      ? '<button class="btn sm" data-act="leaserenew" data-arg="'+l.jti+'">Продлить</button> <button class="btn danger sm" data-act="leaserevoke" data-arg="'+l.jti+'">Отозвать</button>'
      : (l.state==="Действует" ? '<button class="btn danger sm" data-act="leaserevoke" data-arg="'+l.jti+'">Отозвать</button>' : '<span class="chip">—</span>');
    return '<tr><td>'+l.tenant+'</td><td><b>'+l.product+'</b></td><td class="mono">'+l.agent+'</td>'+
      '<td>'+statusBadge(l.state)+'</td><td>'+leftHtml+'</td>'+
      '<td class="mono" style="color:var(--muted)">'+l.grace+'</td>'+
      '<td class="mono" style="color:var(--faint)">'+l.jti+'</td>'+
      '<td style="text-align:right;white-space:nowrap">'+act+'</td></tr>';
  }).join("");

  var polRows = PRODUCTS.map(function(p){
    var pol = policyOf(p.id);
    var hsB = pol.hardstop==="deny"?"b-bad":(pol.hardstop==="shutdown"?"b-bad":"b-warn");
    return '<tr><td><b>'+p.name+'</b> <span class="chip mono">'+p.slug+'</span></td>'+
      '<td class="mono">'+pol.ttl+' ч</td>'+
      '<td><span class="badge b-info">'+pol.grace+' дн.</span></td>'+
      '<td><span class="badge '+hsB+'">'+pol.hardstop+'</span></td>'+
      '<td class="mono">'+pol.max+'</td>'+
      '<td style="text-align:right"><button class="btn sm" data-act="policyopen" data-arg="'+p.id+'">⚙ Изменить</button></td></tr>';
  }).join("");

  return '<div class="grid" style="gap:16px">'+
    '<div class="grid" style="grid-template-columns:repeat(4,1fr)">'+
      kpi({icon:"🛡️",color:"var(--accent)",label:"Активных лизов",value:LEASES.length})+
      kpi({icon:"✅",color:"var(--ok)",label:"Действуют",value:valid})+
      kpi({icon:"⏳",color:"var(--warn)",label:"В льготном периоде",value:grace.length,delta:grace.length?"мин. остаток "+Math.min.apply(null,grace.map(function(g){return g.left;}))+" дн.":""})+
      kpi({icon:"⛔",color:"var(--bad)",label:"Остановлены (HardStop)",value:hard})+
    '</div>'+
    '<div class="panel"><div class="ph"><h3>Отчёт «Льготный период» · какие продукты работают после окончания лицензии</h3><span class="spacer"></span>'+
      '<span class="badge b-warn">GET /api/licenses/grace</span></div>'+
      '<div class="pb scroll"><table><thead><tr><th>Организация</th><th>Продукт</th><th>Агент</th><th>Состояние</th>'+
      '<th>Осталось</th><th>Грейс до</th><th>Лиз (jti)</th><th></th></tr></thead><tbody>'+graceRows+'</tbody></table></div></div>'+
    '<div class="panel"><div class="ph"><h3>Политика лицензирования · per-product</h3><span class="spacer"></span>'+
      '<span class="badge b-info">PUT /api/products/{id}/license-policy</span></div>'+
      '<div class="pb scroll"><table><thead><tr><th>Продукт</th><th>TTL лиза</th><th>Льготный период</th><th>Режим HardStop</th><th>Max инстансов</th><th></th></tr></thead><tbody>'+polRows+'</tbody></table></div></div>'+
  '</div>';
}

function policyModalHtml(){
  if(!S.policyModal) return "";
  var p = PRODUCTS.filter(function(x){return x.id===S.policyModal;})[0];
  var pol = policyOf(p.id);
  var opt = function(v,cur){ return '<option'+(v===cur?' selected':'')+'>'+v+'</option>'; };
  return '<div class="modal-bg" data-act="policyclose"><div class="modal">'+
    '<div class="mh"><div><h3 style="margin:0">Политика лицензии · '+p.name+'</h3>'+
      '<div style="font-size:12px;color:var(--muted);margin-top:3px">Баланс защиты и устойчивости к простоям (§2.15)</div></div>'+
      '<span class="x" data-act="policyclose">×</span></div>'+
    '<div class="mb">'+
      '<div style="display:flex;gap:14px">'+
        '<div class="field" style="flex:1"><label>TTL лиза (часы)</label><input class="input mono" id="pol-ttl" value="'+pol.ttl+'"/></div>'+
        '<div class="field" style="flex:1"><label>Льготный период (дней)</label><input class="input mono" id="pol-grace" value="'+pol.grace+'"/></div>'+
      '</div>'+
      '<div style="display:flex;gap:14px">'+
        '<div class="field" style="flex:1"><label>Режим HardStop</label><select class="input" id="pol-hs">'+opt("read-only",pol.hardstop)+opt("deny",pol.hardstop)+opt("shutdown",pol.hardstop)+'</select></div>'+
        '<div class="field" style="flex:1"><label>Max инстансов</label><input class="input mono" id="pol-max" value="'+pol.max+'"/></div>'+
      '</div>'+
      '<div class="note" style="background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:12.5px;color:var(--muted)">'+
        'Льготный период 7 дней — рекомендованное значение: продукт переживает простои Control Plane и сети, а неплатящий клиент гарантированно останавливается.</div>'+
    '</div>'+
    '<div class="mf"><button class="btn" data-act="policyclose">Отмена</button>'+
      '<button class="btn primary" data-act="policysave">Сохранить политику</button></div></div></div>';
}

function relNewModalHtml(){
  if(!S.relNew) return "";
  var p = PRODUCTS.filter(function(x){return x.id===S.relNew;})[0];
  return '<div class="modal-bg" data-act="relnewclose"><div class="modal">'+
    '<div class="mh"><div><h3 style="margin:0">Публикация релиза · '+p.name+'</h3>'+
      '<div style="font-size:12px;color:var(--muted);margin-top:3px">catalog проверит semver, compose, схему конфига, подпись и digest (S2)</div></div>'+
      '<span class="x" data-act="relnewclose">×</span></div>'+
    '<div class="mb">'+
      '<div style="display:flex;gap:14px">'+
        '<div class="field" style="flex:1"><label>Версия (semver)</label><input class="input mono" id="rl-v" placeholder="напр. 2.4.0"/></div>'+
        '<div class="field" style="flex:1"><label>Канал публикации</label><select class="input" id="rl-ch"><option>beta</option><option>edge</option><option>stable</option></select></div>'+
      '</div>'+
      '<div class="field"><label>Релиз-ноуты (по одной строке)</label><textarea class="input" id="rl-notes" rows="4" placeholder="Новая функция…&#10;Исправление…"></textarea></div>'+
      '<div class="field"><label>Образ (repo)</label><input class="input mono" id="rl-img" placeholder="harbor/'+p.slug+'/gateway"/></div>'+
      '<div class="note" style="background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:12.5px;color:var(--muted)">'+
        'При публикации образ подписывается cosign и фиксируется по digest, формируется SBOM. Релиз неизменяем.</div>'+
    '</div>'+
    '<div class="mf"><button class="btn" data-act="relnewclose">Отмена</button>'+
      '<button class="btn primary" data-act="relnewsubmit">Опубликовать релиз</button></div></div></div>';
}

function promoteModalHtml(){
  if(!S.promote) return "";
  var p = PRODUCTS.filter(function(x){return x.id===S.promote.pid;})[0];
  return '<div class="modal-bg" data-act="promoteclose"><div class="modal" style="width:min(460px,100%)">'+
    '<div class="mh"><div><h3 style="margin:0">Продвижение по каналам</h3>'+
      '<div style="font-size:12px;color:var(--muted);margin-top:3px">'+p.name+' <span class="mono">'+S.promote.ver+'</span></div></div>'+
      '<span class="x" data-act="promoteclose">×</span></div>'+
    '<div class="mb">'+
      '<div class="field"><label>Целевой канал стабильности</label><select class="input" id="pr-ch"><option>stable</option><option>beta</option><option>edge</option></select></div>'+
      '<div class="note" style="background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:12.5px;color:var(--muted)">'+
        '<b>stable</b> — продакшн · <b>beta</b> — пилоты/staging · <b>edge</b> — ранний доступ. Гранты выдаются под конкретный канал.</div>'+
    '</div>'+
    '<div class="mf"><button class="btn" data-act="promoteclose">Отмена</button>'+
      '<button class="btn primary" data-act="promotesubmit">Продвинуть</button></div></div></div>';
}

function enrollModalHtml(){
  if(!S.enroll) return "";
  var tOpts = TENANTS.map(function(t){return '<option>'+t.name+'</option>';}).join("");
  var body = S.enrollResult
    ? '<div class="mb">'+
        '<div class="note" style="background:rgba(22,163,74,.06);border:1px solid rgba(22,163,74,.3);border-radius:10px;padding:14px;color:var(--text)">'+
          '✓ Агент <b class="mono">'+S.enrollResult.id+'</b> заведён (статус «Зарегистрирован»). Передайте организации установщик и одноразовый токен.</div>'+
        '<div class="field" style="margin-top:14px"><label>Одноразовый enrollment-токен (короткий TTL)</label><input class="input mono" readonly value="'+S.enrollResult.token+'"/></div>'+
        '<div class="field"><label>Ссылка на установщик апплайанса</label><input class="input mono" readonly value="https://dl.inversionwharf.io/agent/installer.sh?a='+S.enrollResult.id+'"/></div>'+
        '<div class="hint" style="font-size:11.5px;color:var(--faint)">Агент вводит токен при первом старте → CSR → Vault PKI подписывает mTLS-сертификат (S1).</div>'+
      '</div>'+
      '<div class="mf"><button class="btn primary" data-act="enrollclose">Готово</button></div>'
    : '<div class="mb">'+
        '<div class="field"><label>Организация</label><select class="input" id="en-tenant">'+tOpts+'</select></div>'+
        '<div class="field"><label>Hostname сервера клиента</label><input class="input mono" id="en-host" placeholder="prod-eu-03"/></div>'+
        '<div class="note" style="background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:12.5px;color:var(--muted)">'+
          'Будет создан агент и сгенерирован одноразовый токен. Docker предустанавливать не нужно — он встроен в апплайанс.</div>'+
      '</div>'+
      '<div class="mf"><button class="btn" data-act="enrollclose">Отмена</button>'+
        '<button class="btn primary" data-act="enrollsubmit">Создать токен</button></div>';
  return '<div class="modal-bg" data-act="enrollclose"><div class="modal" style="width:min(520px,100%)">'+
    '<div class="mh"><div><h3 style="margin:0">Регистрация агента (enrollment)</h3>'+
      '<div style="font-size:12px;color:var(--muted);margin-top:3px">Сценарий S1 · fleet-service + Vault PKI</div></div>'+
      '<span class="x" data-act="enrollclose">×</span></div>'+body+'</div></div>';
}

function tenantModalHtml(){
  if(!S.tenantModal) return "";
  return '<div class="modal-bg" data-act="tenantclose"><div class="modal" style="width:min(460px,100%)">'+
    '<div class="mh"><div><h3 style="margin:0">Новая организация (tenant)</h3></div>'+
      '<span class="x" data-act="tenantclose">×</span></div>'+
    '<div class="mb">'+
      '<div class="field"><label>Название</label><input class="input" id="tn-name" placeholder="Например, Stark Industries"/></div>'+
      '<div class="field"><label>План</label><select class="input" id="tn-plan"><option>Trial</option><option>Business</option><option>Enterprise</option></select></div>'+
    '</div>'+
    '<div class="mf"><button class="btn" data-act="tenantclose">Отмена</button>'+
      '<button class="btn primary" data-act="tenantsubmit">Создать</button></div></div></div>';
}

/* ============================== SHELL ============================== */
var NAV = [
  { id:"overview", ic:"📊", label:"Обзор" },
  { id:"catalog",  ic:"📦", label:"Каталог" },
  { id:"fleet",    ic:"🚢", label:"Флот" },
  { id:"grants",   ic:"🔑", label:"Гранты" },
  { id:"licenses", ic:"🛡️", label:"Лицензии" },
  { id:"telemetry",ic:"📡", label:"Телеметрия" },
  { id:"audit",    ic:"📜", label:"Аудит" }
];
var TITLES = {
  overview:["Обзор платформы","Состояние флота, каталога и доступов"],
  catalog:["Каталог продуктов","Продукты, релизы, каналы и образы (pin по digest)"],
  fleet:["Флот","Организации-клиенты и их агенты-апплайансы"],
  grants:["Гранты доступа","Какие продукты доступны каким организациям и агентам"],
  licenses:["Лицензии","Политика, лизы и льготный период (рантайм-лицензирование B9)"],
  telemetry:["Телеметрия","Фактически установленное состояние, сообщённое агентами"],
  audit:["Аудит","Неизменяемый журнал операторских действий и enrollment'ов"]
};

var S = { view:"overview", catSel:null, fleetTab:"agents", relModal:null, grantModal:false,
  policyModal:null, relNew:null, promote:null, enroll:false, enrollResult:null, tenantModal:false };
var $root = document.getElementById("root");
var nextGrantId = 7, nextAgentSeq = 1;

function render(){
  var nav = NAV.map(function(n){
    return '<div class="nav '+(S.view===n.id?"active":"")+'" data-act="view" data-arg="'+n.id+'">'+
      '<span class="ic">'+n.ic+'</span><span>'+n.label+'</span></div>';
  }).join("");
  var t = TITLES[S.view];
  var content = S.view==="overview"?vOverview():S.view==="catalog"?vCatalog():
    S.view==="fleet"?vFleet():S.view==="grants"?vGrants():
    S.view==="licenses"?vLicenses():
    S.view==="telemetry"?vTelemetry():vAudit();

  $root.innerHTML =
    '<div class="app"><aside class="sidebar">'+
      '<div class="brand"><div class="logo">⚓</div><div><b>InversionWharf</b><small>Control Plane</small></div></div>'+
      '<div class="navlbl">Платформа</div>'+nav+
      '<div class="navlbl">Реестр</div>'+
      '<div class="nav"><span class="ic">🐳</span><span>Harbor</span><span class="badge b-ok" style="margin-left:auto"><span class="dot" style="background:var(--ok)"></span>в строю</span></div>'+
      '<div class="nav"><span class="ic">🔐</span><span>Vault PKI</span><span class="badge b-ok" style="margin-left:auto"><span class="dot" style="background:var(--ok)"></span>в строю</span></div>'+
      '<div class="sidefoot"><div class="avatar">A</div><div style="line-height:1.3"><div style="font-size:13px;font-weight:600">alice</div>'+
        '<div style="font-size:11px;color:var(--muted)">OPERATOR · OIDC</div></div></div>'+
    '</aside>'+
    '<main class="main"><div class="topbar"><div><h1>'+t[0]+'</h1><div class="sub">'+t[1]+'</div></div>'+
      '<div class="spacer"></div><input class="search" placeholder="Поиск продукта, агента, гранта…"/>'+
      '<button class="btn">⟳ Обновить</button></div>'+content+'</main></div>'+
    relModalHtml()+grantModalHtml()+policyModalHtml()+relNewModalHtml()+promoteModalHtml()+enrollModalHtml()+tenantModalHtml();
}

function isBgClick(t, e){ return t.classList.contains("modal-bg") ? (e.target===t) : true; }

$root.addEventListener("click", function(e){
  var t = e.target.closest("[data-act]"); if(!t) return;
  var act = t.getAttribute("data-act"), arg = t.getAttribute("data-arg");
  if(act==="view"){ S.view=arg; S.catSel=null; render(); return; }
  if(act==="cat"){ S.catSel=arg; render(); return; }
  if(act==="catback"){ S.catSel=null; render(); return; }
  if(act==="fleettab"){ S.fleetTab=arg; render(); return; }
  if(act==="rel"){ S.relModal={pid:arg, ver:t.getAttribute("data-ver")}; render(); return; }
  if(act==="relclose"){ if(!isBgClick(t,e)) return; S.relModal=null; render(); return; }
  if(act==="grantopen"){ S.grantModal=true; render(); return; }
  if(act==="grantclose"){ if(!isBgClick(t,e)) return; S.grantModal=false; render(); return; }
  if(act==="grantsubmit"){
    var g = {
      id:"g-"+String(++nextGrantId).padStart(3,"0"),
      tenant: document.getElementById("g-tenant").value,
      product: document.getElementById("g-product").value,
      channel: document.getElementById("g-channel").value,
      scope: document.getElementById("g-scope").value,
      agent: "—",
      exp: document.getElementById("g-exp").value || "—",
      status: "Действует"
    };
    GRANTS.push(g); S.grantModal=false; render(); return;
  }
  if(act==="revoke"){
    var gr = GRANTS.filter(function(x){return x.id===arg;})[0];
    if(gr) gr.status = "Отозван";
    render(); return;
  }
  /* ---- лицензии: политика и лизы ---- */
  if(act==="policyopen"){ S.policyModal=arg; render(); return; }
  if(act==="policyclose"){ if(!isBgClick(t,e)) return; S.policyModal=null; render(); return; }
  if(act==="policysave"){
    var pol = policyOf(S.policyModal);
    pol.ttl = parseInt(document.getElementById("pol-ttl").value,10)||pol.ttl;
    pol.grace = parseInt(document.getElementById("pol-grace").value,10)||pol.grace;
    pol.hardstop = document.getElementById("pol-hs").value;
    pol.max = parseInt(document.getElementById("pol-max").value,10)||pol.max;
    LIC_POLICY[S.policyModal] = pol;
    AUDIT.unshift({t:"сейчас", actor:"op:alice", action:"license.policy.update", target:S.policyModal+" грейс="+pol.grace+"д", kind:"info"});
    S.policyModal=null; render(); return;
  }
  if(act==="leaserenew"){
    var l = LEASES.filter(function(x){return x.jti===arg;})[0];
    if(l){ l.state="Действует"; l.grace="—"; l.left=null;
      AUDIT.unshift({t:"сейчас",actor:"op:alice",action:"license.lease.renew",target:l.tenant+" / "+l.product,kind:"ok"}); }
    render(); return;
  }
  if(act==="leaserevoke"){
    var l2 = LEASES.filter(function(x){return x.jti===arg;})[0];
    if(l2){ l2.state="Остановлен"; l2.left=0;
      AUDIT.unshift({t:"сейчас",actor:"op:alice",action:"license.lease.revoke",target:l2.tenant+" / "+l2.product+" ("+l2.jti+")",kind:"bad"}); }
    render(); return;
  }
  /* ---- публикация релиза ---- */
  if(act==="relnewopen"){ S.relNew=arg; render(); return; }
  if(act==="relnewclose"){ if(!isBgClick(t,e)) return; S.relNew=null; render(); return; }
  if(act==="relnewsubmit"){
    var pid = S.relNew, v = (document.getElementById("rl-v").value||"").trim();
    if(!v){ document.getElementById("rl-v").focus(); return; }
    var ch = document.getElementById("rl-ch").value;
    var notes = (document.getElementById("rl-notes").value||"").split("\n").map(function(s){return s.trim();}).filter(Boolean);
    var repo = (document.getElementById("rl-img").value||"harbor/new/image").trim();
    if(!notes.length) notes=["Релиз "+v+" опубликован."];
    RELEASES[pid] = RELEASES[pid]||[];
    RELEASES[pid].unshift({ v:v, ch:ch, at:"сейчас", signed:true, sbom:true, cve:0,
      images:[{repo:repo, digest:"sha256:"+Math.random().toString(16).slice(2,12)}], notes:notes });
    var pr = PRODUCTS.filter(function(x){return x.id===pid;})[0]; if(pr){ pr.releases++; pr.latest=v; }
    AUDIT.unshift({t:"сейчас",actor:"op:alice",action:"release.publish",target:(pr?pr.slug:pid)+" "+v,kind:"info"});
    S.relNew=null; render(); return;
  }
  /* ---- продвижение по каналам ---- */
  if(act==="promoteopen"){ S.promote={pid:arg, ver:t.getAttribute("data-ver")}; render(); return; }
  if(act==="promoteclose"){ if(!isBgClick(t,e)) return; S.promote=null; render(); return; }
  if(act==="promotesubmit"){
    var ch2 = document.getElementById("pr-ch").value;
    var rels = RELEASES[S.promote.pid]||[];
    var r = rels.filter(function(x){return x.v===S.promote.ver;})[0];
    if(r) r.ch = ch2;
    AUDIT.unshift({t:"сейчас",actor:"op:alice",action:"release.promote → "+ch2,target:S.promote.ver,kind:"ok"});
    S.promote=null; render(); return;
  }
  /* ---- enrollment агента ---- */
  if(act==="enrollopen"){ S.enroll=true; S.enrollResult=null; render(); return; }
  if(act==="enrollclose"){ if(!isBgClick(t,e)) return; S.enroll=false; S.enrollResult=null; render(); return; }
  if(act==="enrollsubmit"){
    var tn = document.getElementById("en-tenant").value;
    var host = (document.getElementById("en-host").value||"new-host-"+nextAgentSeq).trim();
    var id = "ag-"+Math.random().toString(16).slice(2,6);
    AGENTS.push({ id:id, host:host, tenant:tn, status:"Зарегистрирован", ver:"—", seen:"никогда", installs:0 });
    nextAgentSeq++;
    S.enrollResult = { id:id, token:"enr_"+Math.random().toString(36).slice(2,10).toUpperCase() };
    AUDIT.unshift({t:"сейчас",actor:"op:alice",action:"agent.register",target:tn+" / "+host,kind:"info"});
    render(); return;
  }
  /* ---- организация ---- */
  if(act==="tenantopen"){ S.tenantModal=true; render(); return; }
  if(act==="tenantclose"){ if(!isBgClick(t,e)) return; S.tenantModal=false; render(); return; }
  if(act==="tenantsubmit"){
    var nm = (document.getElementById("tn-name").value||"").trim();
    if(!nm){ document.getElementById("tn-name").focus(); return; }
    TENANTS.push({ id:"t-"+Math.random().toString(16).slice(2,6), name:nm, agents:0, grants:0, plan:document.getElementById("tn-plan").value });
    AUDIT.unshift({t:"сейчас",actor:"op:alice",action:"tenant.create",target:nm,kind:"info"});
    S.tenantModal=false; render(); return;
  }
});

render();
</script>
</body>
</html>
